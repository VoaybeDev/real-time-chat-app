<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Icône dynamique : remplacez l'URL par celle de votre choix -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" type="image/png" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4A90E2" />
  <meta
    name="description"
    content="Application de messagerie instantanée"
  />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Titre dynamique récupéré via script -->
  <title>Chargement...</title>

  <script>
    // Récupération dynamique du nom de l'application depuis une API ou URL
    fetch("https://api.jsonbin.io/v3/qs/app-config", {
      method: "GET",
      headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(data => {
      // Met à jour le titre de l'onglet avec le nom récupéré
      document.title = data.appName || "ChatNow";
    })
    .catch(() => {
      // Nom par défaut en cas d'échec
      document.title = "ChatNow 💬";
    });

    // Mise à jour de l'icône dynamiquement (optionnel via JS)
    function setDynamicIcon(url) {
      const link = document.querySelector("link[rel='icon']");
      if (link) link.href = url;
    }

    // Exemple : charger l'icône depuis une config distante
    fetch("https://api.jsonbin.io/v3/qs/app-config")
      .then(res => res.json())
      .then(data => {
        if (data.iconUrl) setDynamicIcon(data.iconUrl);
      })
      .catch(() => {
        // Icône par défaut déjà définie dans le <link> ci-dessus
        console.warn("Impossible de charger la config distante, icône par défaut utilisée.");
      });
  </script>
</head>
<body>
  <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
  <div id="root"></div>
</body>
</html>
